<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BankOne – 24/7 Support</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00d4aa;
    --accent2: #0066ff;
    --danger: #ff4757;
    --text: #e8edf5;
    --muted: #6b7a99;
    --bot-bubble: #1a2235;
    --user-bubble: #003366;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: white;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-text span {
    color: var(--accent);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.2);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    max-width: 720px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    flex-direction: row-reverse;
    align-self: flex-end;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .bot-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white;
  }

  .user-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 560px;
  }

  .bot .bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(0,102,255,0.3);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble strong {
    color: var(--accent);
    font-weight: 600;
  }

  .bubble .amount {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    display: block;
    margin: 8px 0 4px;
  }

  .bubble .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'DM Mono', monospace;
  }

  .bubble.error {
    background: rgba(255,71,87,0.08);
    border-color: rgba(255,71,87,0.3);
    color: #ff6b7a;
  }

  .bubble.success {
    background: rgba(0,212,170,0.06);
    border-color: rgba(0,212,170,0.2);
  }

  /* Quick reply buttons */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
    padding-left: 44px;
    animation: slideIn 0.3s ease 0.1s both;
  }

  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .qr-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,170,0.05);
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 24px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
  }

  #userInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 4px 0;
  }

  #userInput::placeholder { color: var(--muted); }

  #sendBtn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 10px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  #sendBtn:hover { opacity: 0.85; }
  #sendBtn:active { transform: scale(0.95); }

  #sendBtn svg { width: 16px; height: 16px; fill: white; }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .blocked-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    color: var(--danger);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">B1</div>
    <div class="logo-text">Bank<span>One</span> Support</div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    ONLINE 24/7
  </div>
</header>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Type a message or choose an option above…" />
    <button id="sendBtn" onclick="handleSend()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
  const API = 'https://fz8023yde4.execute-api.us-east-1.amazonaws.com';
  const chatArea = document.getElementById('chatArea');

  // State
  let awaitingAccountId = null; // 'balance' | 'blockcard'

  function addMessage(content, sender = 'bot', type = '') {
    const msg = document.createElement('div');
    msg.className = `message ${sender}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${sender === 'bot' ? 'bot-avatar' : 'user-avatar'}`;
    avatar.textContent = sender === 'bot' ? 'B1' : 'You';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${type}`;

    if (typeof content === 'string') {
      bubble.innerHTML = content;
    } else {
      bubble.appendChild(content);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot-avatar';
    avatar.textContent = 'B1';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    msg.appendChild(avatar);
    msg.appendChild(indicator);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function addQuickReplies(options) {
    const row = document.createElement('div');
    row.className = 'quick-replies';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = opt.label;
      btn.onclick = () => {
        row.remove();
        handleOption(opt.value);
      };
      row.appendChild(btn);
    });
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showWelcome() {
    setTimeout(() => {
      addMessage(`Hello! Welcome to <strong>BankOne 24/7 Support</strong>.<br>How can I help you today?`);
      addQuickReplies([
        { label: '💳 Check Account Balance', value: 'balance' },
        { label: '🚫 Block My Card', value: 'blockcard' },
        { label: '❓ FAQ', value: 'faq' }
      ]);
    }, 400);
  }

  function handleOption(value) {
    if (value === 'balance') {
      addMessage('Check Account Balance', 'user');
      setTimeout(() => {
        addMessage('Sure! Please enter your <strong>Account ID</strong> (e.g. ACC001 or ACC002):');
        awaitingAccountId = 'balance';
      }, 300);
    } else if (value === 'blockcard') {
      addMessage('Block My Card', 'user');
      setTimeout(() => {
        addMessage('Please enter the <strong>Account ID</strong> for the card you want to block:');
        awaitingAccountId = 'blockcard';
      }, 300);
    } else if (value === 'faq') {
      addMessage('FAQ', 'user');
      setTimeout(() => {
        addMessage('What would you like to know about?');
        addQuickReplies([
          { label: 'Reset PIN', value: 'faq_reset_pin' },
          { label: 'Open Account', value: 'faq_open_account' },
          { label: 'Transfer Limit', value: 'faq_transfer_limit' },
          { label: 'Dispute Transaction', value: 'faq_dispute_transaction' },
          { label: 'Lost Card', value: 'faq_lost_card' }
        ]);
      }, 300);
    } else if (value.startsWith('faq_')) {
      const question = value.replace('faq_', '');
      fetchFAQ(question);
    } else if (value === 'menu') {
      setTimeout(() => {
        addMessage('What else can I help you with?');
        addQuickReplies([
          { label: '💳 Check Account Balance', value: 'balance' },
          { label: '🚫 Block My Card', value: 'blockcard' },
          { label: '❓ FAQ', value: 'faq' }
        ]);
      }, 300);
    }
  }

  async function fetchBalance(accountId) {
    addTyping();
    try {
      const res = await fetch(`${API}/balance?accountId=${accountId}`);
      const data = await res.json();
      removeTyping();
      if (res.ok) {
        addMessage(`
          <span class="label">Account Holder</span>
          <strong>${data.name}</strong>
          <span class="label" style="margin-top:12px">Available Balance</span>
          <span class="amount">$${parseFloat(data.balance).toLocaleString('en-AU', {minimumFractionDigits: 2})}</span>
          <span class="label">Account ID: ${data.accountId}</span>
        `, 'bot', 'success');
      } else {
        addMessage(`Account <strong>${accountId}</strong> was not found. Please check your account ID and try again.`, 'bot', 'error');
      }
    } catch (e) {
      removeTyping();
      addMessage('Something went wrong. Please try again.', 'bot', 'error');
    }
    setTimeout(() => {
      addQuickReplies([{ label: '← Back to Menu', value: 'menu' }]);
    }, 400);
  }

  async function fetchBlockCard(accountId) {
    addTyping();
    try {
      const res = await fetch(`${API}/blockcard`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountId, reason: 'Reported lost or stolen via chatbot' })
      });
      const data = await res.json();
      removeTyping();
      if (res.ok) {
        addMessage(`
          Your card has been <strong>successfully blocked</strong>.<br><br>
          ${data.message}<br>
          <span class="blocked-badge">🔒 CARD BLOCKED</span><br><br>
          <span style="color:var(--muted);font-size:13px">A new card will be issued within 5–7 business days. Call 1800-BANKONE for urgent assistance.</span>
        `, 'bot', 'success');
      } else {
        addMessage(`Could not block card for account <strong>${accountId}</strong>. Please call 1800-BANKONE.`, 'bot', 'error');
      }
    } catch (e) {
      removeTyping();
      addMessage('Something went wrong. Please try again.', 'bot', 'error');
    }
    setTimeout(() => {
      addQuickReplies([{ label: '← Back to Menu', value: 'menu' }]);
    }, 400);
  }

  async function fetchFAQ(question) {
    const labels = {
      reset_pin: 'Reset PIN', open_account: 'Open Account',
      transfer_limit: 'Transfer Limit', dispute_transaction: 'Dispute Transaction', lost_card: 'Lost Card'
    };
    addMessage(labels[question] || question, 'user');
    addTyping();
    try {
      const res = await fetch(`${API}/faq?question=${question}`);
      const data = await res.json();
      removeTyping();
      if (res.ok) {
        addMessage(data.answer);
      } else {
        addMessage('Sorry, I could not find an answer to that question.', 'bot', 'error');
      }
    } catch (e) {
      removeTyping();
      addMessage('Something went wrong. Please try again.', 'bot', 'error');
    }
    setTimeout(() => {
      addQuickReplies([
        { label: 'More FAQ', value: 'faq' },
        { label: '← Back to Menu', value: 'menu' }
      ]);
    }, 400);
  }

  function handleSend() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    addMessage(text, 'user');

    if (awaitingAccountId === 'balance') {
      awaitingAccountId = null;
      fetchBalance(text.toUpperCase());
    } else if (awaitingAccountId === 'blockcard') {
      awaitingAccountId = null;
      fetchBlockCard(text.toUpperCase());
    } else {
      // Simple keyword matching
      const lower = text.toLowerCase();
      if (lower.includes('balance') || lower.includes('money')) {
        handleOption('balance');
      } else if (lower.includes('block') || lower.includes('lost') || lower.includes('stolen')) {
        handleOption('blockcard');
      } else if (lower.includes('faq') || lower.includes('help') || lower.includes('pin') || lower.includes('question')) {
        handleOption('faq');
      } else {
        setTimeout(() => {
          addMessage("I'm not sure how to help with that. Here's what I can do:");
          addQuickReplies([
            { label: '💳 Check Account Balance', value: 'balance' },
            { label: '🚫 Block My Card', value: 'blockcard' },
            { label: '❓ FAQ', value: 'faq' }
          ]);
        }, 300);
      }
    }
  }

  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSend();
  });

  // Boot
  showWelcome();
</script>
</body>
</html>
